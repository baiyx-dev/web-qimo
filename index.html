<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>云栖旅选 | 酒店浏览</title>
    <meta
      name="description"
      content="面向文旅场景的酒店浏览与沉浸式展示平台，可筛选、排序并进入不同酒店详情。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/hotel-list.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="index.html" aria-label="云栖旅选首页">
        <span>云栖旅选</span>
      </a>
      <nav class="header-nav" aria-label="主导航">
        <a href="#hotels">精选酒店</a>
        <a href="pages/hotel-bw.html">B&amp;W 详情</a>
        <a href="pages/hotel-aurelle.html">AURELLE</a>
        <a href="pages/hotel-nexora.html">NEXORA</a>
        <a href="pages/hotel-sylvara.html">SYLVARA</a>
      </nav>
    </header>

    <main>
      <section class="search-hero">
        <div class="search-hero-media">
          <img src="assets/images/common/index-hero.png" alt="高级酒店浏览平台背景" />
        </div>
        <div class="search-hero-content">
          <p class="eyebrow">Curated Hotel Stays</p>
          <h1>发现值得停留的酒店</h1>
        </div>

        <form class="search-panel" id="filters" aria-label="酒店搜索筛选">
          <label>
            <span>目的地</span>
            <input id="keywordInput" type="search" placeholder="搜索城市、酒店名或标签" />
          </label>
          <label>
            <span>入住</span>
            <input type="date" />
          </label>
          <label>
            <span>离店</span>
            <input type="date" />
          </label>
          <label>
            <span>价格</span>
            <select id="priceSelect">
              <option value="all">不限价格</option>
              <option value="0-900">900 元以内</option>
              <option value="900-1600">900-1600 元</option>
              <option value="1600-99999">1600 元以上</option>
            </select>
          </label>
          <button type="submit">搜索酒店</button>
        </form>
      </section>

      <section class="hotel-board" id="hotels">
        <div class="board-heading">
          <div>
            <p class="eyebrow">精选酒店</p>
            <h2>从海岸、城市到森林秘境</h2>
          </div>
          <label class="sort-control">
            <span>排序</span>
            <select id="sortSelect">
              <option value="recommended">推荐优先</option>
              <option value="price-low">价格从低到高</option>
              <option value="score-high">评分从高到低</option>
            </select>
          </label>
        </div>

        <div class="tag-filters" aria-label="体验标签筛选">
          <button class="tag-filter is-active" type="button" data-tag="all">全部</button>
          <button class="tag-filter" type="button" data-tag="海景">海景</button>
          <button class="tag-filter" type="button" data-tag="亲子">亲子</button>
          <button class="tag-filter" type="button" data-tag="城市">城市</button>
          <button class="tag-filter" type="button" data-tag="科技">科技</button>
          <button class="tag-filter" type="button" data-tag="森林">森林</button>
          <button class="tag-filter" type="button" data-tag="疗愈">疗愈</button>
        </div>

        <div class="hotel-layout">
          <p class="result-count" id="resultCount"></p>
          <div class="hotel-grid" id="hotelGrid"></div>
          <p class="empty-state" id="emptyState">没有找到符合条件的酒店，请调整筛选条件。</p>
        </div>
      </section>
    </main>

    <script src="assets/js/hotel-list.js"></script>
  </body>
</html>
